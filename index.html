        // Location Picker Component
        const LocationPicker = ({ onSelect, onClose, initialLocation }) => {
          const mapRef = useRef(null);
          const markerRef = useRef(null);
          const [selectedPos, setSelectedPos] = useState(initialLocation || { lat: 39.8283, lng: -98.5795 });

          useEffect(() => {
            if (!mapRef.current) return;
            
            const map = L.map(mapRef.current).setView([selectedPos.lat, selectedPos.lng], initialLocation ? 13 : 4);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
              attribution: '© OpenStreetMap contributors',
              maxZoom: 19
            }).addTo(map);
            
            const marker = L.marker([selectedPos.lat, selectedPos.lng], { draggable: true }).addTo(map);
            markerRef.current = marker;
            
            marker.on('dragend', (e) => {
              const pos = e.target.getLatLng();
              setSelectedPos({ lat: pos.lat, lng: pos.lng });
            });
            
            map.on('click', (e) => {
              marker.setLatLng(e.latlng);
              setSelectedPos({ lat: e.latlng.lat, lng: e.latlng.lng });
            });
            
            return () => {
              map.remove();
            };
          }, []);

          return (
            <div 
              className="fixed inset-0 flex items-center justify-center z-50 p-4"
              style={{backgroundColor: 'rgba(0,0,0,0.5)'}}

        // Main App Component
        function App() {
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [showAuthScreen, setShowAuthScreen] = useState(false);
          const [hikes, setHikes] = useState([]);
          const [loading, setLoading] = useState(true);
          const [currentPage, setCurrentPage] = useState('hikes');
          const [showForm, setShowForm] = useState(false);
          const [selectedBadge, setSelectedBadge] = useState(null);
          const [showLocationPicker, setShowLocationPicker] = useState(false);
          const [useMetric, setUseMetric] = useState(false); // false = imperial, true = metric
          const [formData, setFormData] = useState({
            name: '',
            date: new Date().toISOString().split('T')[0],
            distance: '',
            elevation: '',
            difficulty: 'easy',
            location: '',
            lat: null,
            lng: null,
            notes: '',
            activities: []
          });

          useEffect(() => {
            const unsubscribe = auth.onAuthStateChanged(async (user) => {
              if (user) {
                setUser(user);
                Sentry.setUser({ id: user.uid, email: user.email });
                analytics.logEvent('user_active');
                
                // Load user settings (metric/imperial preference)
                try {
                  const settingsDoc = await db.collection('users').doc(user.uid).collection('settings').doc('preferences').get();
                  if (settingsDoc.exists) {
                    setUseMetric(settingsDoc.data().useMetric || false);
                  }
                } catch (error) {
                  console.log('Settings not found, using defaults');
                }
                
                // Load user's hikes
                const unsubscribeHikes = db.collection('users').doc(user.uid).collection('hikes')
                  .orderBy('date', 'desc')
                  .onSnapshot(
                    snapshot => {
                      setHikes(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                      setLoading(false);
                    },
                    error => {
                      console.error('Firestore error:', error);
                      Sentry.captureException(error);
                      if (error.code === 'permission-denied') {
                        alert('Database permission error. Please make sure you have updated your Firestore security rules.');
                      }
                      setLoading(false);
                    }
                  );
                  
                return () => unsubscribeHikes();
              } else {
                setUser(null);
                setLoading(false);
              }
              setAuthLoading(false);
            });
            return unsubscribe;
          }, []);

          const handleLogin = (user) => {
            setUser(user);
            setShowAuthScreen(false);
          };

          const toggleMetric = async () => {
            const newValue = !useMetric;
            setUseMetric(newValue);
            
            try {
              await db.collection('users').doc(user.uid).collection('settings').doc('preferences').set({
                useMetric: newValue
              }, { merge: true });
            } catch (error) {
              console.error('Error saving preference:', error);
              Sentry.captureException(error);
            }
          };

          // Conversion helpers
          const toKm = (miles) => (miles * 1.60934).toFixed(1);
          const toMeters = (feet) => Math.round(feet * 0.3048);
          const distanceUnit = useMetric ? 'km' : 'mi';
          const elevationUnit = useMetric ? 'm' : 'ft';
          const distanceLabel = useMetric ? 'Distance (kilometers)' : 'Distance (miles)';
          const elevationLabel = useMetric ? 'Elevation (meters)' : 'Elevation (feet)';

          const handleLogout = async () => {
            if (confirm('Are you sure you want to log out?')) {
              await auth.signOut();
              Sentry.setUser(null);
              setHikes([]);
            }
          };

          const handleDeleteAccount = async () => {
            if (!confirm('⚠️ DELETE ACCOUNT?\n\nThis will permanently delete your account and ALL your hikes. This action cannot be undone.\n\nAre you absolutely sure?')) return;
            
            try {
              const userId = user.uid;
              
              // Delete all hikes
              const hikesSnapshot = await db.collection('users').doc(userId).collection('hikes').get();
              const deletePromises = hikesSnapshot.docs.map(doc => doc.ref.delete());
              await Promise.all(deletePromises);
              
              // Delete user account
              await user.delete();
              
              alert('Account deleted successfully');
            } catch (error) {
              if (error.code === 'auth/requires-recent-login') {
                alert('For security, you need to log in again before deleting your account. Please log out, log back in, and try again.');
              } else {
                alert('Error deleting account: ' + error.message);
              }
              Sentry.captureException(error);
            }
          };

          const saveHike = async () => {
            if (!formData.name || !formData.distance) return;
            
            try {
              await db.collection('users').doc(user.uid).collection('hikes').add({
                ...formData,
                distance: parseFloat(formData.distance),
                elevation: parseFloat(formData.elevation) || 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
              });
              
              analytics.logEvent('hike_created');
              
              setFormData({
                name: '',
                date: new Date().toISOString().split('T')[0],
                distance: '',
                elevation: '',
                difficulty: 'easy',
                location: '',
                lat: null,
                lng: null,
                notes: '',
                activities: []
              });
              setShowForm(false);
            } catch (error) {
              alert('Error: ' + error.message);
              Sentry.captureException(error);
            }
          };

          const deleteHike = async (id) => {
            if (confirm('Delete this hike?')) {
              try {
                await db.collection('users').doc(user.uid).collection('hikes').doc(id).delete();
              } catch (error) {
                alert('Error: ' + error.message);
              }
            }
          };

          const downloadHikes = () => {
            if (hikes.length === 0) {
              alert('No hikes to download.');
              return;
            }
            
            let csv = 'Hike Name,Date,Difficulty,Distance (mi),Elevation (ft),Location,Notes,Activities\n';
            
            hikes.forEach(hike => {
              const activities = hike.activities ? hike.activities.map(id => {
                const badge = BADGES.find(b => b.id === id);
                return badge ? badge.name : id;
              }).join('; ') : '';
              
              const notes = (hike.notes || '').replace(/"/g, '""');
              csv += `"${hike.name}","${hike.date}","${hike.difficulty || ''}","${hike.distance}","${hike.elevation || 0}","${hike.location || ''}","${notes}","${activities}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `hikes_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            
            alert('✅ Hikes downloaded!');
          };

          const toggleActivity = (activityId) => {
            const currentActivities = formData.activities || [];
            const newActivities = currentActivities.includes(activityId)
              ? currentActivities.filter(id => id !== activityId)
              : [...currentActivities, activityId];
            setFormData({ ...formData, activities: newActivities });
          };

          // Calculate stats
          const totalDistance = hikes.reduce((sum, h) => sum + (h.distance || 0), 0);
          const totalElevation = hikes.reduce((sum, h) => sum + (h.elevation || 0), 0);

          // Calculate badge progress
          const activityCounts = {};
          hikes.forEach(hike => {
            if (hike.activities) {
              hike.activities.forEach(activityId => {
                activityCounts[activityId] = (activityCounts[activityId] || 0) + 1;
              });
            }
          });

          const seasonalHikes = { spring: 0, summer: 0, fall: 0, winter: 0 };
          hikes.forEach(hike => {
            const month = new Date(hike.date).getMonth() + 1;
            if (month >= 3 && month <= 5) seasonalHikes.spring++;
            else if (month >= 6 && month <= 8) seasonalHikes.summer++;
            else if (month >= 9 && month <= 11) seasonalHikes.fall++;
            else seasonalHikes.winter++;
          });

          const badgeStats = BADGES.map(badge => {
            let earned = false, count = 0;
            
            if (badge.type === 'milestone') {
              if (badge.subtype === 'count') {
                earned = hikes.length >= badge.requirement;
                count = Math.min(hikes.length, badge.requirement);
              } else if (badge.subtype === 'distance') {
                earned = totalDistance >= badge.requirement;
                count = Math.min(Math.floor(totalDistance), badge.requirement);
              } else if (badge.subtype === 'elevation') {
                earned = totalElevation >= badge.requirement;
                count = Math.min(Math.floor(totalElevation), badge.requirement);
              }
            } else if (badge.type === 'seasonal') {
              if (badge.id === 'spring') { count = seasonalHikes.spring; earned = count > 0; }
              else if (badge.id === 'summer') { count = seasonalHikes.summer; earned = count > 0; }
              else if (badge.id === 'fall') { count = seasonalHikes.fall; earned = count > 0; }
              else if (badge.id === 'winter') { count = seasonalHikes.winter; earned = count > 0; }
              else if (badge.id === 'fourseasons') {
                const seasonsCompleted = [seasonalHikes.spring, seasonalHikes.summer, seasonalHikes.fall, seasonalHikes.winter].filter(s => s > 0).length;
                count = seasonsCompleted;
                earned = seasonsCompleted >= 4;
              }
            } else {
              // location, weather, discovery, activity badges
              count = activityCounts[badge.id] || 0;
              earned = count > 0;
            }
            return { ...badge, earned, count };
          });

          const earnedBadges = badgeStats.filter(b => b.earned);

          if (authLoading) {
            return (
              <div className="min-h-screen flex items-center justify-center" style={{backgroundColor: 'var(--cream)'}}>
                <div className="text-center">
                  <div className="text-6xl mb-4">🥾</div>
                  <div className="text-xl" style={{color: 'var(--text-medium)'}}>Loading...</div>
                </div>
              </div>
            );
          }

          if (!user && !showAuthScreen) {
            return <JournalLandingPage onGetStarted={() => setShowAuthScreen(true)} onLogin={() => setShowAuthScreen(true)} />;
          }

          if (!user && showAuthScreen) {
            return <LoginScreen onLogin={handleLogin} onBack={() => setShowAuthScreen(false)} />;
          }

          if (loading) {
            return (
              <div className="min-h-screen flex items-center justify-center" style={{backgroundColor: 'var(--cream)'}}>
                <div className="text-2xl" style={{color: 'var(--forest-green)'}}>Loading your journal...</div>
              </div>
            );
          }

          return (
            <div className="min-h-screen pb-20" style={{backgroundColor: 'var(--cream)'}}>
              {selectedBadge && <BadgeModal badge={selectedBadge} onClose={() => setSelectedBadge(null)} />}
              {showLocationPicker && (
                <LocationPicker
                  initialLocation={formData.lat && formData.lng ? { lat: formData.lat, lng: formData.lng } : null}
                  onSelect={(pos) => {
                    setFormData({ ...formData, lat: pos.lat, lng: pos.lng });
                    setShowLocationPicker(false);
                  }}
                  onClose={() => setShowLocationPicker(false)}
                />
              )}

              {/* Header */}
              <header className="bg-white shadow-sm sticky top-0 z-40 border-b-2" style={{borderColor: 'var(--aged-paper)'}}>
                <div className="max-w-4xl mx-auto px-4 py-4">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <Mountain className="w-8 h-8" style={{color: 'var(--forest-green)'}} />
                      <h1 className="text-2xl font-bold" style={{color: 'var(--forest-green)'}}>Hike Together</h1>
                    </div>
                    <div className="text-sm" style={{color: 'var(--text-medium)'}}>
                      {user.email}
                    </div>
                  </div>
                </div>
              </header>

              <div className="max-w-4xl mx-auto p-4">
                {/* HIKES PAGE */}
                {currentPage === 'hikes' && (
                  <>
                    <div className="mb-6">
                      <h2 className="text-3xl font-bold mb-2" style={{color: 'var(--text-dark)'}}>My Hikes</h2>
                      <p style={{color: 'var(--text-medium)'}}>
                        {hikes.length} hike{hikes.length !== 1 ? 's' : ''} • {useMetric ? toKm(totalDistance) : totalDistance.toFixed(1)} {distanceUnit} • {useMetric ? toMeters(totalElevation).toLocaleString() : totalElevation.toLocaleString()} {elevationUnit}
                      </p>
                    </div>

                    <button
                      onClick={() => setShowForm(!showForm)}
                      className="w-full text-white font-bold py-4 px-6 rounded-lg shadow-lg mb-6 flex items-center justify-center gap-2"
                      style={{backgroundColor: 'var(--forest-green)'}}
                    >
                      <Plus />
                      {showForm ? 'Close Form' : 'Add New Hike'}
                    </button>

                    {showForm && (
                      <div className="bg-white rounded-lg shadow-md p-6 mb-6 border-2" style={{borderColor: 'var(--aged-paper)'}}>
                        <h3 className="text-2xl font-bold mb-4" style={{color: 'var(--forest-green)'}}>Record Your Adventure</h3>
                        <div className="space-y-4">
                          <input
                            type="text"
                            placeholder="Hike Name"
                            value={formData.name}
                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                            className="w-full p-3 border-2 rounded-lg outline-none"
                            style={{borderColor: 'var(--aged-paper)'}}
                          />
                          <input
                            type="date"
                            value={formData.date}
                            onChange={(e) => setFormData({...formData, date: e.target.value})}
                            className="w-full p-3 border-2 rounded-lg outline-none"
                            style={{borderColor: 'var(--aged-paper)'}}
                          />
                          <select
                            value={formData.difficulty}
                            onChange={(e) => setFormData({...formData, difficulty: e.target.value})}
                            className="w-full p-3 border-2 rounded-lg outline-none"
                            style={{borderColor: 'var(--aged-paper)'}}
                          >
                            <option value="easy">Easy 🟢</option>
                            <option value="medium">Medium 🟡</option>
                            <option value="hard">Hard 🔴</option>
                          </select>
                          <input
                            type="number"
                            step="0.1"
                            placeholder={distanceLabel}
                            value={formData.distance}
                            onChange={(e) => setFormData({...formData, distance: e.target.value})}
                            className="w-full p-3 border-2 rounded-lg outline-none"
                            style={{borderColor: 'var(--aged-paper)'}}
                          />
                          <input
                            type="number"
                            placeholder={elevationLabel}
                            value={formData.elevation}
                            onChange={(e) => setFormData({...formData, elevation: e.target.value})}
                            className="w-full p-3 border-2 rounded-lg outline-none"
                            style={{borderColor: 'var(--aged-paper)'}}
                          />
                          
                          {/* Location Button */}
                          <div>
                            <button
                              type="button"
                              onClick={() => setShowLocationPicker(true)}
                              className="w-full p-3 border-2 rounded-lg font-semibold flex items-center justify-center gap-2"
                              style={{borderColor: 'var(--forest-green)', color: 'var(--forest-green)'}}
                            >
                              <MapPin />
                              {formData.lat && formData.lng ? 'Change Location' : 'Add Location (Optional)'}
                            </button>
                            {formData.lat && formData.lng && (
                              <p className="text-sm mt-2" style={{color: 'var(--text-medium)'}}>
                                📍 Location set: {formData.lat.toFixed(4)}, {formData.lng.toFixed(4)}
                              </p>
                            )}
                          </div>

                          <textarea
                            placeholder="Notes"
                            value={formData.notes}
                            onChange={(e) => setFormData({...formData, notes: e.target.value})}
                            className="w-full p-3 border-2 rounded-lg outline-none h-24"
                            style={{borderColor: 'var(--aged-paper)'}}
                          />

                          {/* Badge Selection */}
                          <div className="border-2 rounded-lg p-4" style={{borderColor: 'var(--aged-paper)'}}>
                            <h4 className="font-semibold mb-2" style={{color: 'var(--forest-green)'}}>
                              🏆 What did you see/do? (Click to toggle)
                            </h4>
                            <p className="text-sm mb-3" style={{color: 'var(--text-medium)'}}>
                              Select all the activities, wildlife, and features you encountered
                            </p>
                            <div className="space-y-2 max-h-96 overflow-y-auto">
                              {BADGES.filter(b => b.type !== 'milestone' || (b.type === 'milestone' && !b.requirement)).map(badge => {
                                const selected = formData.activities && formData.activities.includes(badge.id);
                                return (
                                  <button
                                    key={badge.id}
                                    type="button"
                                    onClick={() => toggleActivity(badge.id)}
                                    className="w-full p-3 rounded-lg border-2 transition text-left flex items-start gap-3"
                                    style={{
                                      borderColor: selected ? 'var(--forest-green)' : 'var(--aged-paper)',
                                      backgroundColor: selected ? '#e8f5e9' : 'white'
                                    }}
                                  >
                                    <div className="text-3xl flex-shrink-0">{badge.icon}</div>
                                    <div className="flex-1 min-w-0">
                                      <div className="font-semibold" style={{color: 'var(--forest-green)'}}>
                                        {badge.name}
                                      </div>
                                      <div className="text-sm" style={{color: 'var(--text-medium)'}}>
                                        {badge.desc}
                                      </div>
                                    </div>
                                    {selected && (
                                      <div className="flex-shrink-0 text-green-600 text-xl">✓</div>
                                    )}
                                  </button>
                                );
                              })}
                            </div>
                          </div>

                          <div className="flex gap-2">
                            <button
                              onClick={saveHike}
                              className="flex-1 text-white font-bold py-3 rounded-lg"
                              style={{backgroundColor: 'var(--forest-green)'}}
                            >
                              Save Hike
                            </button>
                            <button
                              onClick={() => setShowForm(false)}
                              className="flex-1 bg-gray-300 font-bold py-3 rounded-lg"
                              style={{color: 'var(--text-dark)'}}
                            >
                              Cancel
                            </button>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* Hike List */}
                    {hikes.length === 0 ? (
                      <div className="text-center py-12">
                        <div className="text-6xl mb-4">🥾</div>
                        <p className="text-xl mb-2" style={{color: 'var(--text-medium)'}}>No hikes yet!</p>
                        <p className="text-sm" style={{color: 'var(--text-medium)'}}>Tap "Add New Hike" to get started</p>
                      </div>
                    ) : (
                      <div className="space-y-4">
                        {hikes.map(hike => (
                          <div key={hike.id} className="bg-white rounded-lg shadow-md p-4 border-l-4" style={{borderColor: 'var(--forest-green)'}}>
                            <div className="flex justify-between items-start mb-2">
                              <div className="flex-1">
                                <h3 className="text-lg font-bold" style={{color: 'var(--forest-green)'}}>{hike.name}</h3>
                                <p className="text-sm" style={{color: 'var(--text-medium)'}}>
                                  {new Date(hike.date).toLocaleDateString()}
                                </p>
                              </div>
                              <button
                                onClick={() => deleteHike(hike.id)}
                                className="text-red-600 hover:text-red-700"
                              >
                                <Trash />
                              </button>
                            </div>
                            <div className="grid grid-cols-2 gap-2 mb-2">
                              <div className="rounded p-2" style={{backgroundColor: 'var(--cream)'}}>
                                <div className="text-xs" style={{color: 'var(--text-medium)'}}>Distance</div>
                                <div className="font-bold" style={{color: 'var(--forest-green)'}}>
                                  {useMetric ? toKm(hike.distance) : hike.distance} {distanceUnit}
                                </div>
                              </div>
                              {hike.elevation > 0 && (
                                <div className="rounded p-2" style={{backgroundColor: 'var(--cream)'}}>
                                  <div className="text-xs" style={{color: 'var(--text-medium)'}}>Elevation</div>
                                  <div className="font-bold" style={{color: 'var(--forest-green)'}}>
                                    {useMetric ? toMeters(hike.elevation).toLocaleString() : hike.elevation} {elevationUnit}
                                  </div>
                                </div>
                              )}
                            </div>
                            {hike.notes && (
                              <p className="text-sm italic mt-2" style={{color: 'var(--text-medium)'}}>"{hike.notes}"</p>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </>
                )}

                {/* BADGES PAGE */}
                {currentPage === 'badges' && (
                  <>
                    <div className="mb-6">
                      <h2 className="text-3xl font-bold mb-2" style={{color: 'var(--text-dark)'}}>Achievements</h2>
                      <p style={{color: 'var(--text-medium)'}}>
                        {earnedBadges.length} of {BADGES.length} badges earned
                      </p>
                    </div>

                    <div className="bg-white rounded-lg shadow-md p-6 mb-6">
                      {earnedBadges.length > 0 && (
                        <div className="mb-8">
                          <h3 className="text-xl font-semibold mb-4 pb-2 border-b-2" style={{color: 'var(--forest-green)', borderColor: 'var(--aged-paper)'}}>
                            🎉 Earned Badges
                          </h3>
                          <div className="grid grid-cols-4 md:grid-cols-6 gap-3">
                            {earnedBadges.map(badge => (
                              <div
                                key={badge.id}
                                onClick={() => setSelectedBadge(badge)}
                                className="text-center p-3 rounded-lg border-2 cursor-pointer relative"
                                style={{backgroundColor: '#fff9e6', borderColor: '#ffd54f'}}
                              >
                                <div className="text-3xl mb-1">{badge.icon}</div>
                                <div className="font-semibold text-xs leading-tight">{badge.name}</div>
                                {badge.count > 0 && !badge.milestone && (
                                  <div className="absolute -top-2 -right-2 rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold" style={{backgroundColor: 'var(--forest-green)', color: 'white'}}>
                                    {badge.count}
                                  </div>
                                )}
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      <div>
                        <h3 className="text-xl font-semibold mb-4 pb-2 border-b-2" style={{color: 'var(--text-medium)', borderColor: 'var(--aged-paper)'}}>
                          🔒 Locked Badges
                        </h3>
                        <div className="grid grid-cols-4 md:grid-cols-6 gap-3">
                          {badgeStats.filter(b => !b.earned).map(badge => {
                            const progress = badge.milestone && badge.requirement ? Math.min((badge.count / badge.requirement) * 100, 100) : 0;
                            return (
                              <div
                                key={badge.id}
                                onClick={() => setSelectedBadge(badge)}
                                className="text-center p-3 rounded-lg border-2 cursor-pointer relative"
                                style={{backgroundColor: 'var(--cream)', borderColor: 'var(--aged-paper)'}}
                              >
                                <div className="text-3xl mb-1 opacity-50">{badge.icon}</div>
                                <div className="font-semibold text-xs leading-tight opacity-70">{badge.name}</div>
                                {badge.milestone && badge.requirement && progress > 0 && (
                                  <div className="mt-1">
                                    <div className="w-full rounded-full h-1.5 overflow-hidden" style={{backgroundColor: 'var(--aged-paper)'}}>
                                      <div className="h-1.5 rounded-full" style={{backgroundColor: 'var(--forest-green)', width: `${progress}%`}}></div>
                                    </div>
                                    <div className="text-xs mt-0.5" style={{color: 'var(--text-medium)'}}>{Math.floor(progress)}%</div>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </>
                )}

                {/* PROFILE PAGE */}
                {currentPage === 'profile' && (
                  <>
                    <div className="mb-6">
                      <h2 className="text-3xl font-bold mb-2" style={{color: 'var(--text-dark)'}}>Profile</h2>
                      <p style={{color: 'var(--text-medium)'}}>{user.email}</p>
                    </div>

                    <div className="bg-white rounded-lg shadow-md p-6 mb-6">
                      {/* Stats */}
                      <div className="mb-6 pb-6 border-b-2" style={{borderColor: 'var(--aged-paper)'}}>
                        <h3 className="font-semibold mb-3" style={{color: 'var(--forest-green)'}}>📊 Your Stats</h3>
                        <div className="grid grid-cols-2 gap-4">
                          <div className="rounded-lg p-4 text-center" style={{backgroundColor: 'var(--cream)'}}>
                            <div className="text-3xl font-bold" style={{color: 'var(--forest-green)'}}>{hikes.length}</div>
                            <div className="text-sm" style={{color: 'var(--text-medium)'}}>Total Hikes</div>
                          </div>
                          <div className="rounded-lg p-4 text-center" style={{backgroundColor: 'var(--cream)'}}>
                            <div className="text-3xl font-bold" style={{color: 'var(--forest-green)'}}>
                              {useMetric ? toKm(totalDistance) : totalDistance.toFixed(1)}
                            </div>
                            <div className="text-sm" style={{color: 'var(--text-medium)'}}>{distanceUnit === 'km' ? 'Kilometers' : 'Miles'}</div>
                          </div>
                          <div className="rounded-lg p-4 text-center" style={{backgroundColor: 'var(--cream)'}}>
                            <div className="text-3xl font-bold" style={{color: 'var(--forest-green)'}}>
                              {useMetric ? toMeters(totalElevation).toLocaleString() : totalElevation.toLocaleString()}
                            </div>
                            <div className="text-sm" style={{color: 'var(--text-medium)'}}>{elevationUnit === 'm' ? 'Meters' : 'Feet'} Climbed</div>
                          </div>
                          <div className="rounded-lg p-4 text-center" style={{backgroundColor: 'var(--cream)'}}>
                            <div className="text-3xl font-bold" style={{color: 'var(--forest-green)'}}>{earnedBadges.length}</div>
                            <div className="text-sm" style={{color: 'var(--text-medium)'}}>Badges</div>
                          </div>
                        </div>
                      </div>

                      {/* Units Preference */}
                      <div className="mb-6 pb-6 border-b-2" style={{borderColor: 'var(--aged-paper)'}}>
                        <h3 className="font-semibold mb-3" style={{color: 'var(--forest-green)'}}>📏 Units</h3>
                        <div className="flex items-center justify-between p-4 rounded-lg" style={{backgroundColor: 'var(--cream)'}}>
                          <div>
                            <div className="font-semibold" style={{color: 'var(--text-dark)'}}>
                              {useMetric ? 'Metric (km, m)' : 'Imperial (mi, ft)'}
                            </div>
                            <div className="text-sm" style={{color: 'var(--text-medium)'}}>
                              Distance and elevation units
                            </div>
                          </div>
                          <button
                            onClick={toggleMetric}
                            className="px-6 py-2 font-semibold rounded-lg border-2 transition"
                            style={{
                              backgroundColor: 'var(--forest-green)',
                              borderColor: 'var(--forest-green)',
                              color: 'white'
                            }}
                          >
                            Switch to {useMetric ? 'Imperial' : 'Metric'}
                          </button>
                        </div>
                      </div>

                      {/* Download */}
                      <div className="mb-6 pb-6 border-b-2" style={{borderColor: 'var(--aged-paper)'}}>
                        <h3 className="font-semibold mb-3" style={{color: 'var(--forest-green)'}}>💾 Export Data</h3>
                        <button
                          onClick={downloadHikes}
                          className="w-full text-white font-semibold py-3 px-4 rounded-lg flex items-center justify-center gap-2"
                          style={{backgroundColor: 'var(--forest-green)'}}
                        >
                          <Download />
                          Download Hikes as CSV
                        </button>
                      </div>

                      {/* Log Out */}
                      <div className="mb-6 pb-6 border-b-2" style={{borderColor: 'var(--aged-paper)'}}>
                        <h3 className="font-semibold mb-3 text-red-700">⚠️ Account Actions</h3>
                        <button
                          onClick={handleLogout}
                          className="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 px-4 rounded-lg flex items-center justify-center gap-2 mb-2"
                        >
                          <LogOut />
                          Log Out
                        </button>
                        <button
                          onClick={handleDeleteAccount}
                          className="w-full bg-red-800 hover:bg-red-900 text-white font-semibold py-3 px-4 rounded-lg flex items-center justify-center gap-2"
                        >
                          <Trash />
                          Delete Account
                        </button>
                      </div>
                    </div>
                  </>
                )}
              </div>

              {/* Bottom Navigation */}
              <div className="fixed bottom-0 left-0 right-0 bg-white border-t-2 shadow-lg z-40" style={{borderColor: 'var(--aged-paper)'}}>
                <div className="max-w-4xl mx-auto flex justify-around items-center py-2">
                  <button
                    onClick={() => { setCurrentPage('hikes'); setShowForm(false); }}
                    className="flex flex-col items-center justify-center py-1 px-3 transition"
                    style={{color: currentPage === 'hikes' ? 'var(--forest-green)' : 'var(--text-medium)'}}
                  >
                    <Mountain className="mb-1" />
                    <div className="text-xs font-semibold">Hikes</div>
                  </button>

                  <button
                    onClick={() => { setCurrentPage('badges'); setShowForm(false); }}
                    className="flex flex-col items-center justify-center py-1 px-3 transition"
                    style={{color: currentPage === 'badges' ? 'var(--forest-green)' : 'var(--text-medium)'}}
                  >
                    <Award className="mb-1" />
                    <div className="text-xs font-semibold">Badges</div>
                  </button>

                  <button
                    onClick={() => { setCurrentPage('profile'); setShowForm(false); }}
                    className="flex flex-col items-center justify-center py-1 px-3 transition"
                    style={{color: currentPage === 'profile' ? 'var(--forest-green)' : 'var(--text-medium)'}}
                  >
                    <User className="mb-1" />
                    <div className="text-xs font-semibold">Profile</div>
                  </button>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
